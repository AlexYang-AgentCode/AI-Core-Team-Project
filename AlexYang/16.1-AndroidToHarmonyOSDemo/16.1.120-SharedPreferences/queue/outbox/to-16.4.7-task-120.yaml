source_context:
  android_class: "MainActivity"
  android_usage: |
    // 初始化
    sharedPreferences = getSharedPreferences("MYPREFS", MODE_PRIVATE);
    editor = sharedPreferences.edit();
    
    // 保存数据
    editor.putString("KEY_1", text);
    editor.apply();
    
    // 读取数据
    if (sharedPreferences.contains("KEY_1")) {
        String text = sharedPreferences.getString("KEY_1", "");
    }
    
    // 删除数据
    editor.remove("KEY_1");
    editor.commit();
  
  key_apis:
    - "android.content.SharedPreferences"
    - "android.content.SharedPreferences.Editor"
    - "getSharedPreferences(name, mode)"
    - "getString(key, defValue)"
    - "putString(key, value)"
    - "remove(key)"
    - "contains(key)"
    - "apply()"
    - "commit()"

requirements:
  bridge_name: "SharedPreferencesBridge"
  harmony_base: "@ohos.data.preferences"
  
  interface_spec: |
    import { preferences } from '@kit.ArkData';
    import { Context } from '@kit.AbilityKit';
    
    /**
     * 类Android SharedPreferences的Bridge
     * 封装 @ohos.data.preferences 提供兼容接口
     */
    export class SharedPreferencesBridge {
      private static instances: Map<string, SharedPreferencesBridge> = new Map();
      private preferences: preferences.Preferences;
      
      /**
       * 获取SharedPreferences实例（单例模式）
       * @param context 上下文
       * @param name 配置文件名
       * @returns SharedPreferencesBridge实例
       */
      static getInstance(context: Context, name: string): SharedPreferencesBridge;
      
      /**
       * 获取字符串值
       * @param key 键名
       * @param defValue 默认值
       * @returns 存储的值或默认值
       */
      getString(key: string, defValue?: string): string;
      
      /**
       * 检查键是否存在
       * @param key 键名
       * @returns 是否存在
       */
      contains(key: string): boolean;
      
      /**
       * 获取编辑器
       * @returns Editor实例
       */
      edit(): PreferencesEditorBridge;
    }
    
    /**
     * SharedPreferences编辑器
     */
    export class PreferencesEditorBridge {
      private preferences: preferences.Preferences;
      private modified: Map<string, Object>;
      
      /**
       * 存储字符串值
       * @param key 键名
       * @param value 值
       * @returns this（支持链式调用）
       */
      putString(key: string, value: string): PreferencesEditorBridge;
      
      /**
       * 移除键值对
       * @param key 键名
       * @returns this（支持链式调用）
       */
      remove(key: string): PreferencesEditorBridge;
      
      /**
       * 异步提交修改
       * @returns Promise<void>
       */
      apply(): Promise<void>;
      
      /**
       * 同步提交修改
       * @returns 是否成功
       */
      commit(): boolean;
    }

implementation_notes: |
  1. 使用 preferences.getPreferences(context, name) 获取Preferences实例
  2. getString()需要处理Promise，封装为同步返回
  3. 链式调用模式：edit().putString().putString().apply()
  4. apply()为异步，使用await preferences.flush()
  5. commit()为同步，直接调用preferences.flush()后返回true
  6. MODE_PRIVATE在HarmonyOS中默认，无需处理

