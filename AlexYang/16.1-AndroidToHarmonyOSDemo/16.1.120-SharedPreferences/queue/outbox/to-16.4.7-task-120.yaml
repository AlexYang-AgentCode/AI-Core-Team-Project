test_cases:
  - name: "singleton instance"
    steps: 
      - "getInstance(ctx, 'test1')两次"
    expected: "返回同一实例"
    
  - name: "put and get string"
    steps:
      - "edit().putString('key', 'value').commit()"
      - "getString('key', '')"
    expected: "返回'value'"
    
  - name: "default value"
    input: "getString('nonexistent', 'default')"
    expected: "返回'default'"
    
  - name: "contains key"
    steps:
      - "edit().putString('key', 'value').commit()"
      - "contains('key')"
    expected: "返回true"
    
  - name: "remove key"
    steps:
      - "edit().putString('key', 'value').commit()"
      - "edit().remove('key').commit()"
      - "contains('key')"
    expected: "返回false"
    
  - name: "chain editing"
    steps:
      - "edit().putString('k1','v1').putString('k2','v2').apply()"
    expected: "两个键都存储成功"
    
  - name: "async apply"
    steps:
      - "await edit().putString('key','value').apply()"
    expected: "Promise resolve，数据已保存"

acceptance_criteria:
  - "所有Android SharedPreferences方法都有对应实现"
  - "链式调用正常工作: edit().putString().putString().apply()"
  - "单例模式确保同一name返回同一实例"
  - "getString同步返回（内部处理Promise）"
  - "apply()异步提交，commit()同步提交"

notes: |
