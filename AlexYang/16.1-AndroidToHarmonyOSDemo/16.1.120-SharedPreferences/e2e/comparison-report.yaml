  scenarios:
    - name: "页面启动 - 初始状态"
      android_behavior: |
        页面标题 "SharedPreferences"
        输入框显示默认文本 "Hello"
        显示区域显示 "[SharedPreference]"
        三个按钮：SAVE, OPEN, DELETE
      harmony_behavior: |
        页面标题 "SharedPreferences"
        输入框显示默认文本 "Hello"
        显示区域显示 "[SharedPreference]"
        三个按钮：SAVE, OPEN, DELETE
      diff: "MATCH"
      
    - name: "输入文本并保存"
      android_behavior: |
        在EditText输入 "Test123"
        点击 SAVE 按钮
        显示 Toast: "SharedPreferences Saved!\nPress OPEN"
        软键盘自动隐藏
      harmony_behavior: |
        在TextInput输入 "Test123"
        点击 SAVE 按钮
        显示 Toast: "SharedPreferences Saved!\nPress Open to view"
        软键盘自动隐藏（失焦时）
      diff: "MATCH"
      detail: |
        两者都使用轻量级键值存储
        Android: SharedPreferences.Editor.apply()
        HarmonyOS: preferences.putSync() + flush()
      
    - name: "读取保存的数据"
      android_behavior: |
        点击 OPEN 按钮
        TextView 显示保存的 "Test123"
      harmony_behavior: |
        点击 OPEN 按钮
        Text 组件显示保存的 "Test123"
      diff: "MATCH"
      detail: |
        Android: sharedPreferences.getString("KEY_1", "")
        HarmonyOS: pref.getSync("KEY_TEXT", "")
      
    - name: "删除数据"
      android_behavior: |
        点击 DELETE 按钮
        显示 Toast: "SharedPreferences delete"
        TextView 显示 "SharedPreferences is null"
      harmony_behavior: |
        点击 DELETE 按钮
        显示 Toast: "SharedPreferences deleted"
        Text 组件显示 "SharedPreferences is null"
      diff: "MATCH"
      detail: |
        Android: editor.remove() + editor.commit()
        HarmonyOS: pref.deleteSync() + flush()
      
    - name: "空文本保存验证"
      android_behavior: |
        清空 EditText
        点击 SAVE
        显示 Toast: "Please set any text"
        数据未被保存
      harmony_behavior: |
        清空 TextInput
        点击 SAVE
        显示 Toast: "Please set any text"
        数据未被保存
      diff: "MATCH"
      
    - name: "数据持久化"
      android_behavior: |
        保存数据后关闭应用
        重新打开应用点击 OPEN
        数据依然存在
      harmony_behavior: |
        保存数据后关闭应用
        重新打开应用点击 OPEN
        数据依然存在
      diff: "MATCH"
      detail: |
        两者都将数据持久化到文件系统
        Android: /data/data/<package>/shared_prefs/
        HarmonyOS: /data/accounts/account_0/appdata/<bundle>/prefs/

