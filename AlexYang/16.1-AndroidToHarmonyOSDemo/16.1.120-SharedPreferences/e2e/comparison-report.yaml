  technical_notes:
    - "Android SharedPreferences → HarmonyOS @ohos.data.preferences"
    - "Editor.apply() → putSync() + flush() (异步)"
    - "Editor.commit() → putSync() + flush() (同步)"
    - "MODE_PRIVATE 为 HarmonyOS 默认行为"
    - "InputMethodManager.hideSoftInputFromWindow 不需要，HarmonyOS 失焦自动隐藏键盘"

  recommendations:
    - "当前实现直接使用原生preferences API，无需Bridge也可工作"
    - "如需保持代码与Android更接近，可使用16.4.7的SharedPreferencesBridge"
    - "建议添加输入字符限制，只允许数字和小写字母（与Android digits属性一致）"
    - "考虑添加键盘隐藏逻辑优化用户体验"

