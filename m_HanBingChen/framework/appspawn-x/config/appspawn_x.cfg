{
    "jobs": [
        {
            "name": "pre-init:appspawn-x",
            "cmds": [
                "mkdir /data/service/el1/public/appspawnx 0711 root system",
                "mkdir /data/misc/appspawnx/dalvik-cache 0711 root root",
                "mkdir /data/misc/appspawnx/dalvik-cache/arm64 0711 root root"
            ]
        },
        {
            "name": "services:appspawn-x",
            "cmds": [
                "start appspawn-x"
            ]
        }
    ],
    "services": [
        {
            "name": "appspawn-x",
            "path": ["/system/bin/appspawn-x", "--socket-name", "AppSpawnX"],
            "uid": "root",
            "gid": ["system", "shell"],
            "importance": -20,
            "critical": [1, 4, 240],
            "once": 0,
            "console": 0,
            "disabled": 0,
            "secon": "u:r:appspawn_x:s0",
            "caps": [
                "SYS_PTRACE",
                "KILL",
                "SETUID",
                "SETGID",
                "SETPCAP",
                "NET_ADMIN",
                "NET_RAW",
                "DAC_OVERRIDE",
                "DAC_READ_SEARCH",
                "FOWNER",
                "CHOWN",
                "SYS_CHROOT",
                "SYS_ADMIN"
            ],
            "writepid": [
                "/dev/memcg/perf_sensitive/cgroup.procs"
            ],
            "socket": [
                {
                    "name": "AppSpawnX",
                    "family": "AF_UNIX",
                    "type": "SOCK_STREAM",
                    "protocol": "default",
                    "permissions": "0660",
                    "uid": "root",
                    "gid": "system"
                }
            ],
            "bootevents": [
                "bootevent.appspawn_x.ready"
            ],
            "env": [
                {
                    "name": "ANDROID_ROOT",
                    "value": "/system"
                },
                {
                    "name": "ANDROID_DATA",
                    "value": "/data"
                },
                {
                    "name": "BOOTCLASSPATH",
                    "value": "/system/framework/framework.jar:/system/framework/ext.jar:/system/framework/services.jar:/system/framework/apache-xml.jar"
                },
                {
                    "name": "DEX2OATBOOTCLASSPATH",
                    "value": "/system/framework/framework.jar:/system/framework/ext.jar"
                },
                {
                    "name": "SYSTEMSERVERCLASSPATH",
                    "value": ""
                }
            ]
        }
    ]
}
